<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forever</title>
  <style>
    html {
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      min-height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stars, .stars2, .stars3 {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background-repeat: repeat;
    }

    .stars {
      background-image:
        radial-gradient(2px 2px at 20px 30px, #ffffff, transparent),
        radial-gradient(2px 2px at 120px 80px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 200px 40px, #ffffff, transparent),
        radial-gradient(2px 2px at 300px 120px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 400px 60px, #ffffff, transparent);
      background-size: 500px 250px;
      animation: fallStars 18s linear infinite;
      opacity: 0.8;
    }

    .stars2 {
      background-image:
        radial-gradient(2px 2px at 60px 100px, #fff8cc, transparent),
        radial-gradient(2px 2px at 180px 40px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 260px 90px, #ffffff, transparent),
        radial-gradient(2px 2px at 340px 20px, #fff8cc, transparent),
        radial-gradient(1.5px 1.5px at 460px 140px, #ffffff, transparent);
      background-size: 550px 280px;
      animation: fallStars 28s linear infinite;
      opacity: 0.6;
    }

    .stars3 {
      background-image:
        radial-gradient(1.5px 1.5px at 40px 50px, #ffffff, transparent),
        radial-gradient(2px 2px at 150px 130px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 280px 70px, #fff8cc, transparent),
        radial-gradient(2px 2px at 390px 100px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 480px 30px, #ffffff, transparent);
      background-size: 600px 300px;
      animation: fallStars 38s linear infinite;
      opacity: 0.4;
    }

    @keyframes fallStars {
      from {
        transform: translateY(-20px);
      }
      to {
        transform: translateY(120px);
      }
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    h1 {
      margin: 0 0 0.8em 0;
      color: #f4f6fb;
      font-size: 4rem;
      line-height: 1.2;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS PMincho", serif;
    }

    .question {
      margin: 0 0 1.5em 0;
      font-size: 2rem;
      line-height: 1.7;
      color: #f5f5f5;
    }

    input {
      width: min(420px, 85%);
      padding: 14px 16px;
      font-size: 1.2rem;
      border: none;
      border-radius: 10px;
      margin-bottom: 16px;
      text-align: center;
      box-sizing: border-box;
    }

    button {
      padding: 12px 28px;
      font-size: 1.1rem;
      border: none;
      border-radius: 999px;
      cursor: pointer;
    }

    .message {
      margin-top: 18px;
      min-height: 2em;
      font-size: 1rem;
      color: #ffd6d6;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 3rem;
      }

      .question {
        font-size: 1.6rem;
      }

      input {
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>

  <div class="container">
    <h1>Forever</h1>
    <p class="question">第1作品の<br>主人公のランクは？</p>

    <input type="password" id="passwordInput" placeholder="答えを入力">
    <br>
    <button id="submitButton">進む</button>

    <p class="message" id="message"></p>
  </div>

  <script>
    (function () {
      const correctPassword = "Z";
      const nextPage = "blawhi-01-00.html";

      const input = document.getElementById("passwordInput");
      const button = document.getElementById("submitButton");
      const message = document.getElementById("message");

      function checkPassword() {
        const value = input.value.trim().toUpperCase();

        if (value === correctPassword) {
          window.location.href = nextPage;
        } else {
          message.textContent = "違います。";
        }
      }

      button.addEventListener("click", checkPassword);

      input.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          checkPassword();
        }
      });
    })();
  </script>
</body>
</html>
