  <script>
    (function () {
      const target = "selmora.html";
      const readyKey = "music_secret_ready_once";

      if (sessionStorage.getItem(readyKey) === "1") {
        sessionStorage.removeItem(readyKey);
        window.location.href = target;
        return;
      }

      let titleTaps = 0;
      let iconTaps = 0;

      const title = document.getElementById("secretTitle");
      const icon = document.getElementById("secretIcon");

      title.addEventListener("click", function () {
        if (titleTaps < 10) {
          titleTaps += 1;
        }
        checkReady();
      });

      icon.addEventListener("click", function () {
        if (iconTaps < 10) {
          iconTaps += 1;
        }
        checkReady();
      });

      function checkReady() {
        if (titleTaps >= 10 && iconTaps >= 10) {
          sessionStorage.setItem(readyKey, "1");
        }
      }

      window.addEventListener("beforeunload", function () {
        if (!(titleTaps >= 10 && iconTaps >= 10)) {
          sessionStorage.removeItem(readyKey);
        }
      });
    })();
  </script>
</body>
