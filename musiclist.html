<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>楽曲一覧</title>
  <style>
    body {
      background-color: #f7f3ea;
      color: #222;
      margin: 0 auto;
      max-width: 820px;
      padding: 24px;
      line-height: 1.8;
      font-size: 17px;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      box-sizing: border-box;
    }

    h1, h2 {
      color: #111;
      line-height: 1.5;
      text-align: center;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    a {
      color: #7a5c61;
      text-decoration: none;
    }

    a:hover {
      color: #9a747b;
      text-decoration: underline;
    }

    p {
      margin: 0 0 1em 0;
    }

    .search-box {
      border: 1px solid #ccc;
      background-color: #fffaf2;
      padding: 16px;
      margin-bottom: 24px;
      box-sizing: border-box;
    }

    .search-box label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .search-box input,
    .search-box select {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-bottom: 14px;
      font-size: 1rem;
      border: 1px solid #ccc;
      background-color: #fff;
    }

    .tag-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 16px;
      margin-bottom: 18px;
    }

    .tag-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-weight: normal;
      line-height: 1.5;
      white-space: normal;
      overflow: visible;
      word-break: keep-all;
    }

    .tag-group input[type="checkbox"] {
      width: auto;
      margin: 0;
      flex-shrink: 0;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button-row button {
      padding: 10px 14px;
      border: 1px solid #bdaea3;
      background-color: #fff;
      cursor: pointer;
      font-size: 1rem;
    }

    .song-list {
      margin-top: 24px;
    }

    .song-item {
      border-bottom: 1px solid #d8d0c8;
      padding: 14px 0;
    }

    .song-title {
      font-size: 1.15rem;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .song-title a {
      color: #7a5c61;
      text-decoration: none;
    }

    .song-title a:hover {
      color: #9a747b;
      text-decoration: underline;
    }

    .song-tags {
      color: #555;
      margin-bottom: 4px;
    }

    .song-date {
      color: #777;
      font-size: 0.95rem;
    }

    .empty-message {
      text-align: center;
      color: #777;
      margin-top: 24px;
    }

    .show-all-wrap {
      text-align: center;
      margin-top: 18px;
    }

    .show-all-link {
      display: inline-block;
      color: #7a5c61;
      cursor: pointer;
      font-size: 1rem;
    }

    .show-all-link:hover {
      color: #9a747b;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>楽曲一覧</h1>

  <p style="text-align: center;">タグや名前から楽曲を探せます。</p>

  <div class="search-box">
    <label for="nameSearch">曲名検索</label>
    <input type="text" id="nameSearch" placeholder="曲名を入力">

    <label>タグ検索</label>
    <div class="tag-group" id="tagFilters">
      <label><input type="checkbox" value="明るい">明るい</label>
      <label><input type="checkbox" value="静か">静か</label>
      <label><input type="checkbox" value="幻想的">幻想的</label>
      <label><input type="checkbox" value="不穏">不穏</label>
      <label><input type="checkbox" value="激しい">激しい</label>

      <label><input type="checkbox" value="配信向け">配信向け</label>
      <label><input type="checkbox" value="ゲーム向け">ゲーム向け</label>
      <label><input type="checkbox" value="小説向け">小説向け</label>
      <label><input type="checkbox" value="OP向け">OP向け</label>
      <label><input type="checkbox" value="ED向け">ED向け</label>

      <label><input type="checkbox" value="日常">日常</label>
      <label><input type="checkbox" value="ファンタジー">ファンタジー</label>
      <label><input type="checkbox" value="和風">和風</label>
      <label><input type="checkbox" value="近未来">近未来</label>
      <label><input type="checkbox" value="洋風">洋風</label>
    </div>

    <label for="monthSearch">投稿日検索（年・月）</label>
    <input type="month" id="monthSearch">

    <label for="sortOrder">並べ替え</label>
    <select id="sortOrder">
      <option value="new">新しい順</option>
      <option value="old">古い順</option>
      <option value="name">名前順</option>
    </select>

    <div class="button-row">
      <button type="button" id="resetFilters">条件をリセット</button>
    </div>
  </div>

  <div class="song-list" id="songList"></div>
  <p class="empty-message" id="emptyMessage" style="display:none;">該当する楽曲がありません。</p>

  <div class="show-all-wrap" id="showAllWrap" style="display:none;">
    <span class="show-all-link" id="showAllLink">━━━すべて表示━━━</span>
  </div>

  <p style="text-align: center;"><a href="music.html">音楽トップへ戻る</a></p>
  <p style="text-align: center;"><a href="index.html">総合トップへ戻る</a></p>

  <script>
    const songs = [
      {
        name: "夜の境界",
        tags: ["静か", "幻想的", "小説向け", "ファンタジー"],
        date: "2026-03-13",
        link: "music-01.html"
      },
      {
        name: "朝焼けの道",
        tags: ["明るい", "配信向け", "日常", "洋風"],
        date: "2026-03-10",
        link: "music-02.html"
      },
      {
        name: "虚ろな灯",
        tags: ["不穏", "ゲーム向け", "近未来", "小説向け"],
        date: "2026-03-08",
        link: "music-03.html"
      },
      {
        name: "花霞",
        tags: ["静か", "和風", "ED向け", "幻想的"],
        date: "2026-03-05",
        link: "music-04.html"
      },
      {
        name: "蒼の風景",
        tags: ["明るい", "幻想的", "ファンタジー", "配信向け"],
        date: "2026-03-02",
        link: "music-05.html"
      },
      {
        name: "追憶の雨",
        tags: ["静か", "小説向け", "洋風", "ED向け"],
        date: "2026-02-27",
        link: "music-06.html"
      },
      {
        name: "閃光ドライブ",
        tags: ["激しい", "ゲーム向け", "OP向け", "近未来"],
        date: "2026-02-22",
        link: "music-07.html"
      },
      {
        name: "夕凪の庭",
        tags: ["静か", "日常", "和風", "配信向け"],
        date: "2026-02-18",
        link: "music-08.html"
      },
      {
        name: "白銀回廊",
        tags: ["幻想的", "ファンタジー", "小説向け", "静か"],
        date: "2026-02-12",
        link: "music-09.html"
      },
      {
        name: "鼓動の先へ",
        tags: ["激しい", "OP向け", "洋風", "ゲーム向け"],
        date: "2026-02-05",
        link: "music-10.html"
      },
      {
        name: "宵のまばたき",
        tags: ["静か", "幻想的", "ED向け", "日常"],
        date: "2026-01-30",
        link: "music-11.html"
      },
      {
        name: "星屑ランナー",
        tags: ["明るい", "ゲーム向け", "近未来", "OP向け"],
        date: "2026-01-24",
        link: "music-12.html"
      },
      {
        name: "薄明の書庫",
        tags: ["静か", "小説向け", "ファンタジー", "洋風"],
        date: "2026-01-19",
        link: "music-13.html"
      },
      {
        name: "焔の拍動",
        tags: ["激しい", "ゲーム向け", "和風", "OP向け"],
        date: "2026-01-11",
        link: "music-14.html"
      },
      {
        name: "風待ちの丘",
        tags: ["明るい", "配信向け", "日常", "ED向け"],
        date: "2026-01-03",
        link: "music-15.html"
      }
    ];

    const songList = document.getElementById("songList");
    const emptyMessage = document.getElementById("emptyMessage");
    const showAllWrap = document.getElementById("showAllWrap");
    const showAllLink = document.getElementById("showAllLink");
    const nameSearch = document.getElementById("nameSearch");
    const monthSearch = document.getElementById("monthSearch");
    const sortOrder = document.getElementById("sortOrder");
    const tagFilters = document.querySelectorAll("#tagFilters input[type='checkbox']");
    const resetFiltersBtn = document.getElementById("resetFilters");

    let showAllMode = false;

    function getSelectedTags() {
      return Array.from(tagFilters)
        .filter(tag => tag.checked)
        .map(tag => tag.value);
    }

    function filterSongs() {
      const keyword = nameSearch.value.trim().toLowerCase();
      const selectedTags = getSelectedTags();
      const selectedMonth = monthSearch.value;

      let filtered = songs.filter(song => {
        const nameMatch = song.name.toLowerCase().includes(keyword);
        const tagMatch = selectedTags.every(tag => song.tags.includes(tag));
        const monthMatch = selectedMonth ? song.date.startsWith(selectedMonth) : true;
        return nameMatch && tagMatch && monthMatch;
      });

      if (sortOrder.value === "new") {
        filtered.sort((a, b) => b.date.localeCompare(a.date));
      } else if (sortOrder.value === "old") {
        filtered.sort((a, b) => a.date.localeCompare(b.date));
      } else if (sortOrder.value === "name") {
        filtered.sort((a, b) => a.name.localeCompare(b.name, "ja"));
      }

      return filtered;
    }

    function renderSongs() {
      const filtered = filterSongs();
      const visibleSongs = showAllMode ? filtered : filtered.slice(0, 10);

      songList.innerHTML = "";

      if (filtered.length === 0) {
        emptyMessage.style.display = "block";
        showAllWrap.style.display = "none";
        return;
      }

      emptyMessage.style.display = "none";

      visibleSongs.forEach(song => {
        const item = document.createElement("div");
        item.className = "song-item";

        item.innerHTML = `
          <div class="song-title"><a href="${song.link}">${song.name}</a></div>
          <div class="song-tags">${song.tags.join(" / ")}</div>
          <div class="song-date">${song.date}</div>
        `;

        songList.appendChild(item);
      });

      if (!showAllMode && filtered.length > 10) {
        showAllWrap.style.display = "block";
      } else {
        showAllWrap.style.display = "none";
      }
    }

    nameSearch.addEventListener("input", function () {
      showAllMode = false;
      renderSongs();
    });

    monthSearch.addEventListener("input", function () {
      showAllMode = false;
      renderSongs();
    });

    sortOrder.addEventListener("change", function () {
      showAllMode = false;
      renderSongs();
    });

    tagFilters.forEach(tag => tag.addEventListener("change", function () {
      showAllMode = false;
      renderSongs();
    }));

    showAllLink.addEventListener("click", function () {
      showAllMode = true;
      renderSongs();
    });

    resetFiltersBtn.addEventListener("click", function () {
      nameSearch.value = "";
      monthSearch.value = "";
      sortOrder.value = "new";
      tagFilters.forEach(tag => tag.checked = false);
      showAllMode = false;
      renderSongs();
    });

    renderSongs();
  </script>
</body>
</html>
