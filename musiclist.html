<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>楽曲一覧</title>
  <style>
    body {
      background-color: #f7f3ea;
      color: #222;
      margin: 0 auto;
      max-width: 820px;
      padding: 24px;
      line-height: 1.9;
      font-size: 17px;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    h1, h2 {
      color: #111;
      line-height: 1.6;
      text-align: center;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
    }

    a {
      color: #7a5c61;
      text-decoration: none;
    }

    a:hover {
      color: #9a747b;
      text-decoration: underline;
    }

    p {
      margin: 0 0 1em 0;
    }

    .search-box {
      border: 1px solid #ccc;
      background-color: #fffaf2;
      padding: 16px;
      margin-bottom: 24px;
    }

    .search-box label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .search-box input,
    .search-box select {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-bottom: 14px;
      font-size: 1rem;
      border: 1px solid #ccc;
      background-color: #fff;
    }

    .tag-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-bottom: 14px;
    }

    .tag-group label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: normal;
      margin-bottom: 0;
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .button-row button {
      padding: 10px 14px;
      border: 1px solid #bdaea3;
      background-color: #fff;
      cursor: pointer;
      font-size: 1rem;
    }

    .song-list {
      margin-top: 24px;
    }

    .song-item {
      border-bottom: 1px solid #d8d0c8;
      padding: 14px 0;
    }

    .song-title {
      font-size: 1.15rem;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .song-title a {
      color: #7a5c61;
      text-decoration: none;
    }

    .song-title a:hover {
      color: #9a747b;
      text-decoration: underline;
    }

    .song-tags {
      color: #555;
      margin-bottom: 4px;
    }

    .song-date {
      color: #777;
      font-size: 0.95rem;
    }

    .empty-message {
      text-align: center;
      color: #777;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <h1>楽曲一覧</h1>

  <p style="text-align: center;">タグや名前から楽曲を探せます。</p>

  <div class="search-box">
    <label for="nameSearch">曲名検索</label>
    <input type="text" id="nameSearch" placeholder="曲名を入力">

    <label>タグ検索</label>
    <div class="tag-group" id="tagFilters">
      <label><input type="checkbox" value="明るい">明るい</label>
      <label><input type="checkbox" value="静か">静か</label>
      <label><input type="checkbox" value="幻想的">幻想的</label>
      <label><input type="checkbox" value="不穏">不穏</label>
      <label><input type="checkbox" value="激しい">激しい</label>

      <label><input type="checkbox" value="配信向け">配信向け</label>
      <label><input type="checkbox" value="ゲーム向け">ゲーム向け</label>
      <label><input type="checkbox" value="小説向け">小説向け</label>
      <label><input type="checkbox" value="OP向け">OP向け</label>
      <label><input type="checkbox" value="ED向け">ED向け</label>

      <label><input type="checkbox" value="日常">日常</label>
      <label><input type="checkbox" value="ファンタジー">ファンタジー</label>
      <label><input type="checkbox" value="和風">和風</label>
      <label><input type="checkbox" value="近未来">近未来</label>
      <label><input type="checkbox" value="洋風">洋風</label>
    </div>

    <label for="dateSearch">投稿日検索</label>
    <input type="date" id="dateSearch">

    <label for="sortOrder">並べ替え</label>
    <select id="sortOrder">
      <option value="new">新しい順</option>
      <option value="old">古い順</option>
      <option value="name">名前順</option>
    </select>

    <div class="button-row">
      <button type="button" id="showDefault">最新10件表示</button>
      <button type="button" id="showAll">すべて表示</button>
      <button type="button" id="resetFilters">条件をリセット</button>
    </div>
  </div>

  <div class="song-list" id="songList"></div>
  <p class="empty-message" id="emptyMessage" style="display:none;">該当する楽曲がありません。</p>

  <p style="text-align: center;"><a href="music.html">音楽トップへ戻る</a></p>
  <p style="text-align: center;"><a href="index.html">総合トップへ戻る</a></p>

  <script>
    const songs = [
      {
        name: "夜の境界",
        tags: ["静か", "幻想的", "小説向け", "ファンタジー"],
        date: "2026-03-13",
        link: "music-01.html"
      },
      {
        name: "朝焼けの道",
        tags: ["明るい", "配信向け", "日常", "洋風"],
        date: "2026-03-10",
        link: "music-02.html"
      },
      {
        name: "虚ろな灯",
        tags: ["不穏", "小説向け", "ゲーム向け", "近未来"],
        date: "2026-03-08",
        link: "music-03.html"
      }
    ];

    const songList = document.getElementById("songList");
    const emptyMessage = document.getElementById("emptyMessage");
    const nameSearch = document.getElementById("nameSearch");
    const dateSearch = document.getElementById("dateSearch");
    const sortOrder = document.getElementById("sortOrder");
    const tagFilters = document.querySelectorAll("#tagFilters input[type='checkbox']");
    const showDefaultBtn = document.getElementById("showDefault");
    const showAllBtn = document.getElementById("showAll");
    const resetFiltersBtn = document.getElementById("resetFilters");

    let showAllMode = false;

    function getSelectedTags() {
      return Array.from(tagFilters)
        .filter(tag => tag.checked)
        .map(tag => tag.value);
    }

    function filterSongs() {
      const keyword = nameSearch.value.trim().toLowerCase();
      const selectedTags = getSelectedTags();
      const selectedDate = dateSearch.value;

      let filtered = songs.filter(song => {
        const nameMatch = song.name.toLowerCase().includes(keyword);
        const tagMatch = selectedTags.every(tag => song.tags.includes(tag));
        const dateMatch = selectedDate ? song.date === selectedDate : true;
        return nameMatch && tagMatch && dateMatch;
      });

      if (sortOrder.value === "new") {
        filtered.sort((a, b) => b.date.localeCompare(a.date));
      } else if (sortOrder.value === "old") {
        filtered.sort((a, b) => a.date.localeCompare(b.date));
      } else if (sortOrder.value === "name") {
        filtered.sort((a, b) => a.name.localeCompare(b.name, "ja"));
      }

      return filtered;
    }

    function renderSongs() {
      const filtered = filterSongs();
      const visibleSongs = showAllMode ? filtered : filtered.slice(0, 10);

      songList.innerHTML = "";

      if (visibleSongs.length === 0) {
        emptyMessage.style.display = "block";
        return;
      }

      emptyMessage.style.display = "none";

      visibleSongs.forEach(song => {
        const item = document.createElement("div");
        item.className = "song-item";

        item.innerHTML = `
          <div class="song-title"><a href="${song.link}">${song.name}</a></div>
          <div class="song-tags">${song.tags.join(" / ")}</div>
          <div class="song-date">${song.date}</div>
        `;

        songList.appendChild(item);
      });
    }

    nameSearch.addEventListener("input", renderSongs);
    dateSearch.addEventListener("input", renderSongs);
    sortOrder.addEventListener("change", renderSongs);
    tagFilters.forEach(tag => tag.addEventListener("change", renderSongs));

    showDefaultBtn.addEventListener("click", function () {
      showAllMode = false;
      renderSongs();
    });

    showAllBtn.addEventListener("click", function () {
      showAllMode = true;
      renderSongs();
    });

    resetFiltersBtn.addEventListener("click", function () {
      nameSearch.value = "";
      dateSearch.value = "";
      sortOrder.value = "new";
      tagFilters.forEach(tag => tag.checked = false);
      showAllMode = false;
      renderSongs();
    });

    renderSongs();
  </script>
</body>
</html>
