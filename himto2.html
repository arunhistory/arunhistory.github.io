<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ヒント2</title>
  <style>
    html {
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      min-height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS PMincho", serif;
      overflow-x: hidden;
      position: relative;
    }

    .stars, .stars2, .stars3 {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background-repeat: repeat;
    }

    .stars {
      background-image:
        radial-gradient(2px 2px at 20px 30px, #ffffff, transparent),
        radial-gradient(2px 2px at 120px 80px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 200px 40px, #ffffff, transparent),
        radial-gradient(2px 2px at 300px 120px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 400px 60px, #ffffff, transparent);
      background-size: 500px 250px;
      animation: fallStars 18s linear infinite;
      opacity: 0.8;
    }

    .stars2 {
      background-image:
        radial-gradient(2px 2px at 60px 100px, #fff8cc, transparent),
        radial-gradient(2px 2px at 180px 40px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 260px 90px, #ffffff, transparent),
        radial-gradient(2px 2px at 340px 20px, #fff8cc, transparent),
        radial-gradient(1.5px 1.5px at 460px 140px, #ffffff, transparent);
      background-size: 550px 280px;
      animation: fallStars 28s linear infinite;
      opacity: 0.6;
    }

    .stars3 {
      background-image:
        radial-gradient(1.5px 1.5px at 40px 50px, #ffffff, transparent),
        radial-gradient(2px 2px at 150px 130px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 280px 70px, #fff8cc, transparent),
        radial-gradient(2px 2px at 390px 100px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 480px 30px, #ffffff, transparent);
      background-size: 600px 300px;
      animation: fallStars 38s linear infinite;
      opacity: 0.4;
    }

    @keyframes fallStars {
      from {
        transform: translateY(-20px);
      }
      to {
        transform: translateY(120px);
      }
    }

    .box {
      position: relative;
      z-index: 1;
      padding: 24px;
    }

    h1 {
      margin: 0 0 1em 0;
      font-size: 2rem;
      line-height: 1.5;
    }

    p {
      margin: 0;
      font-size: 2.2rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>

  <div class="box">
    <h1>？ヒント？</h1>
    <p>m ▶ n</p>
  </div>
</body>
</html>
