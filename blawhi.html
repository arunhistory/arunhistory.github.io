<!doctype html>
<html lang="ja">
    <style>
  :root {
    --bg-color: #0f1320;
    --text-color: #e9edf7;
    --title-color: #f7f9ff;
    --link-color: #b9a7ff;
    --link-hover: #d7ccff;
    --box-bg: #151b2b;
    --box-border: #33405c;
  }

  body {
    background-color: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    padding: 24px;
    line-height: 1.8;
    font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
  }

  h1, h2 {
    color: var(--title-color);
    font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS PMincho", serif;
  }

  a {
    color: var(--link-color);
  }

  a:hover {
    color: var(--link-hover);
  }

  .notice-box {
    border-left: 4px solid #8b4a4a;
    border-top: 1px solid #5a2f2f;
    border-right: 1px solid #5a2f2f;
    border-bottom: 1px solid #5a2f2f;
    padding: 14px 16px;
    margin-bottom: 24px;
    background-color: #1a1418;
    color: #f3e9e9;
  }

  .notice-box p {
    margin: 0;
  }

  .notice-box p + p {
    margin-top: 8px;
  }

  .news-box {
    max-height: 8em;
    overflow-y: auto;
    padding: 10px 12px;
    background-color: var(--box-bg);
    border: 1px solid var(--box-border);
    color: #cfd7ea;
  }

  .news-box ul {
    margin: 0;
    padding-left: 1.2em;
  }

  .news-box li {
    line-height: 1.6;
  }

  .news-box::-webkit-scrollbar {
    width: 6px;
  }

  .news-box::-webkit-scrollbar-thumb {
    background-color: #3a4666;
  }

  .news-box::-webkit-scrollbar-track {
    background-color: #121827;
  }
</style>
