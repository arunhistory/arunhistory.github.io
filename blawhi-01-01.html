  <h1>第1話 名も知らぬ世界で、息をする</h1>

  <p>産声を上げた瞬間のことは、覚えていない。ただ、あとになって思えば――俺の人生は、その瞬間から「やり直し」だった。</p>
 <p>視界はぼやけ、体は思うように動かない。泣き声を上げているはずなのに、それが自分のものだと理解するまで、少し時間がかかった。</p>
