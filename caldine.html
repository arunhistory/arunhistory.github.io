<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ヒント1</title>
  <style>
    html {
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      min-height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #0b1026 0%, #1a2342 45%, #2f3d68 100%);
      color: #f5f5f5;
      min-height: 100vh;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    .stars, .stars2, .stars3 {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background-repeat: repeat;
    }

    .stars {
      background-image:
        radial-gradient(2px 2px at 20px 30px, #ffffff, transparent),
        radial-gradient(2px 2px at 120px 80px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 200px 40px, #ffffff, transparent),
        radial-gradient(2px 2px at 300px 120px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 400px 60px, #ffffff, transparent);
      background-size: 500px 250px;
      animation: fallStars 18s linear infinite;
      opacity: 0.8;
    }

    .stars2 {
      background-image:
        radial-gradient(2px 2px at 60px 100px, #fff8cc, transparent),
        radial-gradient(2px 2px at 180px 40px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 260px 90px, #ffffff, transparent),
        radial-gradient(2px 2px at 340px 20px, #fff8cc, transparent),
        radial-gradient(1.5px 1.5px at 460px 140px, #ffffff, transparent);
      background-size: 550px 280px;
      animation: fallStars 28s linear infinite;
      opacity: 0.6;
    }

    .stars3 {
      background-image:
        radial-gradient(1.5px 1.5px at 40px 50px, #ffffff, transparent),
        radial-gradient(2px 2px at 150px 130px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 280px 70px, #fff8cc, transparent),
        radial-gradient(2px 2px at 390px 100px, #ffffff, transparent),
        radial-gradient(1.5px 1.5px at 480px 30px, #ffffff, transparent);
      background-size: 600px 300px;
      animation: fallStars 38s linear infinite;
      opacity: 0.4;
    }

    @keyframes fallStars {
      from {
        transform: translateY(-20px);
      }
      to {
        transform: translateY(120px);
      }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    h1 {
      text-align: center;
      margin: 0 0 1.5em 0;
      font-size: 2.2rem;
      line-height: 1.5;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS PMincho", serif;
    }

    h2 {
      margin: 2em 0 0.8em 0;
      font-size: 1.4rem;
      line-height: 1.6;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS PMincho", serif;
    }

    p {
      margin: 0 0 1em 0;
      line-height: 1.9;
      font-size: 1rem;
    }

    .problem-box {
      padding: 16px 18px;
      margin-bottom: 24px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(2px);
    }

    .formula {
      font-size: 1.2rem;
      line-height: 2;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", "MS PMincho", serif;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>

  <div class="container">
    <h1>ヒント1</h1>
    
    <h2>https://arunhistory.github.io/XをYに.htmI</h2>
    
    <div class="problem-box">
      <p class="formula">2x² - (2z+7)x + 4z + 6 = 0</p>
      <p>(x-2)(2x-(2z+3))=0</p>
    </div>

    <div class="problem-box">
      <p>箱A、箱B、箱Cがある。</p>
      <p>箱Aには赤玉2個、白玉2個が入っている。<br>
      箱Bには赤玉3個、白玉1個が入っている。<br>
      箱Cには赤玉2個、白玉1個が入っている。</p>

      <p>3つの箱から1つを等確率で選び、その箱から玉を2個、続けて無作為に取り出す。<br>
      ただし、取り出した玉は元に戻さない。</p>

      <p>取り出した2個の玉がどちらも赤玉であったとき、<br>
      選んだ箱がCであった条件付き確率の逆数を Y とする。</p>

    </div>
  </div>
</body>
</html>
